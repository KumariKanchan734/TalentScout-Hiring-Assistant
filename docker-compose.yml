version: '3.8'

services:
  talentscout:
    build: .
    container_name: talentscout-bot
    ports:
      - "8501:8501"
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY}
    volumes:
      - ./candidates_data.json:/app/candidates_data.json
    restart: unless-stopped
    networks:
      - talentscout-network

networks:
  talentscout-network:
    driver: bridge
